name: Build and Deploy Firmware

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          .pio
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-pio-
          
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
    
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        
    - name: Update version in config.h
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        sed -i "s/#define FLUIDTOUCH_VERSION \".*\"/#define FLUIDTOUCH_VERSION \"${VERSION}\"/" include/config.h
        echo "Updated config.h with version: ${VERSION}"
        grep FLUIDTOUCH_VERSION include/config.h
        
    - name: Build firmware (Basic)
      run: platformio run --environment elecrow-crowpanel-7-basic
      
    - name: Build firmware (Advance)
      run: platformio run --environment elecrow-crowpanel-7-advance
      
    - name: Prepare firmware files
      run: |
        # Create directories for both hardware variants
        mkdir -p web/firmware/basic
        mkdir -p web/firmware/advance
        
        # Copy Basic variant firmware
        cp .pio/build/elecrow-crowpanel-7-basic/firmware.bin web/firmware/basic/
        cp .pio/build/elecrow-crowpanel-7-basic/bootloader.bin web/firmware/basic/
        cp .pio/build/elecrow-crowpanel-7-basic/partitions.bin web/firmware/basic/
        
        # Copy Advance variant firmware
        cp .pio/build/elecrow-crowpanel-7-advance/firmware.bin web/firmware/advance/
        cp .pio/build/elecrow-crowpanel-7-advance/bootloader.bin web/firmware/advance/
        cp .pio/build/elecrow-crowpanel-7-advance/partitions.bin web/firmware/advance/
        
        # boot_app0.bin location varies, try common paths (same for both)
        if [ -f ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin ]; then
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin web/firmware/basic/
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin web/firmware/advance/
        fi
      
    - name: Update manifest files with version
      run: |
        sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.VERSION }}"/' web/manifest_basic.json
        sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.VERSION }}"/' web/manifest_advance.json
        
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ steps.version.outputs.VERSION }}
        path: |
          web/firmware/**/*.bin
          web/manifest_basic.json
          web/manifest_advance.json
          web/index.html
          
    - name: Rename firmware files for release
      run: |
        mkdir -p release
        cp .pio/build/elecrow-crowpanel-7-basic/firmware.bin release/fluidtouch-basic-${{ steps.version.outputs.VERSION }}.bin
        cp .pio/build/elecrow-crowpanel-7-advance/firmware.bin release/fluidtouch-advance-${{ steps.version.outputs.VERSION }}.bin
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          release/fluidtouch-basic-${{ steps.version.outputs.VERSION }}.bin
          release/fluidtouch-advance-${{ steps.version.outputs.VERSION }}.bin
        body: |
          ## FluidTouch ${{ steps.version.outputs.VERSION }}
          
          ### Web Installer
          Install directly from your browser: [FluidTouch Web Installer](https://jeyeager65.github.io/FluidTouch/)
          
          Select your hardware variant during installation:
          - **Basic**: Elecrow CrowPanel 7" Basic (4MB flash, PWM backlight)
          - **Advance**: Elecrow CrowPanel 7" Advance (16MB flash, IPS display, I2C backlight)
          
          ### Manual Installation
          Download the appropriate firmware file for your hardware variant and flash using:
          - [esptool.py](https://docs.espressif.com/projects/esptool/en/latest/esp32s3/index.html): `esptool.py --chip esp32s3 write_flash 0x10000 fluidtouch-[variant]-${{ steps.version.outputs.VERSION }}.bin`
          
          ### Hardware Requirements
          - Elecrow CrowPanel 7" ESP32-S3 HMI Display (Basic or Advance variant)
          - USB-C cable with data support
          
          ### Installation Notes
          - **IMPORTANT**: Choose the correct firmware for your hardware variant
          - First-time installation will erase existing data
          - WiFi credentials will need to be reconfigured
          - Machine configurations stored in preferences
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: read
      pages: write
      id-token: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Download firmware artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: firmware-*
        path: artifacts
        
    - name: Checkout gh-pages branch
      run: |
        git fetch origin gh-pages:gh-pages 2>/dev/null || echo "gh-pages doesn't exist yet"
        if git rev-parse --verify gh-pages >/dev/null 2>&1; then
          git checkout gh-pages
        else
          git checkout --orphan gh-pages
          git rm -rf . || true
        fi
        
    - name: Copy firmware to versioned folder
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        
        # Create version-specific directories
        mkdir -p firmware/${VERSION}/basic
        mkdir -p firmware/${VERSION}/advance-v1.3
        
        # Copy firmware files
        find ../artifacts -path "*/basic/*.bin" -exec cp {} firmware/${VERSION}/basic/ \;
        find ../artifacts -path "*/advance/*.bin" -exec cp {} firmware/${VERSION}/advance-v1.3/ \;
        
        # Copy and update manifests
        cp ../artifacts/firmware-*/web/manifest_basic.json firmware/${VERSION}/manifest_basic.json
        cp ../artifacts/firmware-*/web/manifest_advance.json firmware/${VERSION}/manifest_advance-v1.3.json
        
        # Update manifest paths to point to version-specific firmware
        sed -i "s|./firmware/basic/|./firmware/${VERSION}/basic/|g" firmware/${VERSION}/manifest_basic.json
        sed -i "s|./firmware/advance/|./firmware/${VERSION}/advance-v1.3/|g" firmware/${VERSION}/manifest_advance-v1.3.json
        
    - name: Update versions.json
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        
        # Install jq for JSON manipulation
        sudo apt-get update && sudo apt-get install -y jq
        
        # Load or create versions.json
        if [ ! -f versions.json ]; then
          echo '{"default_version":null,"default_hardware":"advance-v1.3","versions":[],"hardware_info":{"basic":"Basic (4MB flash, PWM backlight)","advance-v1.3":"Advance v1.3 (16MB flash, IPS display)","advance-v1.2":"Advance v1.2 (older revision)"}}' > versions.json
        fi
        
        # Add new version entry
        jq --arg ver "$VERSION" --arg ts "$TIMESTAMP" '
          .versions = ([{
            "id": $ver,
            "hardware": ["basic", "advance-v1.3"],
            "is_preview": false
          }] + .versions) |
          .default_version = $ver
        ' versions.json > versions.json.tmp && mv versions.json.tmp versions.json
        
        echo "Updated versions.json:"
        cat versions.json
        
    - name: Copy web files from source
      run: |
        cp ../web/index.html index.html
        
    - name: Commit and push to gh-pages
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        git add -A
        git commit -m "Deploy stable release: ${VERSION}" || echo "No changes to commit"
        git push origin gh-pages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
